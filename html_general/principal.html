<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Principal - Escritorio</title>
    <link rel="stylesheet" href="principal.css">
</head>
<body>

    <div class="monitor-externo">
        <main id="escritorio">
            <div class="overlay-lineas"></div>
            <img class="wallpaper" src="imagenes_proyectos/fondos/Fondo_principal.jpeg" alt="fondo">

            <div class="iconos-container">
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/adobe.jpeg"><span>Adobe</span></div>
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/programacion.jpeg"><span>Programación</span></div>
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/electronica.jpeg"><span>Electrónica</span></div>
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/desarrollo.jpeg"><span>Desarrollo Web</span></div>
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/audiovisuales.jpeg"><span>Audiovisuales</span></div>
                <div class="item-escritorio"><img src="imagenes_proyectos/principal/3d.jpeg"><span>Diseño 3D</span></div>
                
                <div class="item-escritorio mi-equipo">
                    <img src="imagenes_proyectos/principal/escuela_dos.jpeg"><span>Mi Equipo</span>
                </div>
            </div>

            <footer class="barra-tareas">
                <div class="seccion-inicio">
                    <img src="imagenes_proyectos/principal/logo_windows.png" class="win-btn">
                </div>
                <div class="usuarios">
                    <img src="imagenes_proyectos/fotos_perfil/perfil_jocy.jpeg"><img src="imagenes_proyectos/fotos_perfil/perfil_alex.jpg"><img src="imagenes_proyectos/fotos_perfil/perfil_jade.jpeg"><img src="imagenes_proyectos/fotos_perfil/perfil_re.jpeg">
                </div>
                <div class="sistema">
                    <img src="imagenes_proyectos/principal/wifi.png"><img src="imagenes_proyectos/principal/volumen.png"><img src="imagenes_proyectos/principal/bateria.png">
                    <div class="reloj-mini">8:31 p.m.<br>01/02/2026</div>
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
